version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: ai_ops_postgres
    environment:
      POSTGRES_USER: ai_ops_user
      POSTGRES_PASSWORD: ai_ops_password
      POSTGRES_DB: ai_ops_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: ai_ops_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai_ops_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
